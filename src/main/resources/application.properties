# Database Configuration — reads from environment variables if present,
# falls back to local values for development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campus_marketplace}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration — Railway assigns its own port via env variable
server.port=${PORT:8080}

# JWT Secret — reads from environment, falls back to local dev value
jwt.secret=${JWT_SECRET:campus_marketplace_super_secret_key_2024_abcdefgh}

# Application Name
spring.application.name=campus-marketplace